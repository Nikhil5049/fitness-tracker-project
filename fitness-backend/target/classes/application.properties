# ── Application ───────────────────────────────────────
spring.application.name=fitness-app

# ── Database ───────────────────────────────────────────
# FIX 25: DB password should come from environment variable in production.
#         Change these values to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=615363
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────
# FIX 26: JWT secret is now read from properties (externalised from JwtUtils.java).
#         In production override via environment variable: APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:YS1zdHJpbmctc2VjcmV0LWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmc=}
# 48 hours in milliseconds
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:172800000}

# ── Logging (reduced verbosity for dev) ───────────────
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.com.project.fitness_app=DEBUG

# ── Jackson ───────────────────────────────────────────
# FIX 27: Serialize LocalDateTime as ISO-8601 string instead of array — frontend expects string
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
